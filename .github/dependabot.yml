# Dependabot 配置:跟踪 Python 依赖与 GitHub Actions 版本。
# 文档:https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # Python 依赖(pyproject.toml 的 project.dependencies / optional-dependencies)。
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python

  # .github/workflows/* 中引用的 actions 版本(如 actions/checkout@v4)。
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
