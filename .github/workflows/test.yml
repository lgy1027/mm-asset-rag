name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Install package (locked)
        # ``uv sync`` reads ``uv.lock`` for reproducible installs across
        # CI runs and contributors. Bump ``uv.lock`` via ``uv lock --upgrade``
        # locally before merging dependency changes. Tools (ruff / pytest)
        # land in ``.venv/bin``; subsequent steps invoke them via ``uv run``
        # so the venv is resolved without a manual activate.
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run unit tests
        run: uv run pytest tests/unit -q --cov=mm_asset_rag --cov-report=xml --cov-report=term

      - name: Smoke-test scripts
        # Each script under scripts/ that defines a CLI must at least be
        # importable and respond to --help. This catches syntax errors and
        # missing dependencies without needing ollama / Qdrant / a real
        # corpus. Keep this list in sync with the .py files in scripts/
        # (shell scripts don't speak --help). eval_rag / benchmark both
        # keep their runtime imports lazy so --help works offline.
        run: |
          for s in scripts/eval_rag.py scripts/benchmark.py; do
            echo "::group::$s --help"
            uv run python "$s" --help
            echo "::endgroup::"
          done