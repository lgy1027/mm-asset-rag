name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Install package (locked)
        # ``uv sync`` reads ``uv.lock`` for reproducible installs across
        # CI runs and contributors. Bump ``uv.lock`` via ``uv lock --upgrade``
        # locally before merging dependency changes.
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Run unit tests
        run: pytest tests/unit -q --cov=mm_asset_rag --cov-report=xml --cov-report=term

      - name: Smoke-test scripts
        # Each script under scripts/ must at least be importable and
        # respond to --help. This catches syntax errors and missing
        # dependencies without needing ollama / Qdrant / a real corpus.
        run: |
          for s in scripts/expand_corpus.py scripts/eval_extended.py scripts/prune_corpus.py scripts/eval_rag.py; do
            echo "::group::$s --help"
            python "$s" --help
            echo "::endgroup::"
          done