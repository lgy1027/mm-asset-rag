name: Release

# 触发条件:推送 `v*` 形态的 tag(例如 `v0.1.0`、`v1.2.3`)。
# 打 tag 前请确认:
#   1. 任选一种发布鉴权(二选一):
#      a) PyPI trusted publishing(推荐,无需 token):在 PyPI 项目设置
#         "Trusted Publisher",GitHub 仓库 + workflow 文件名 + 环境名。
#         需本 workflow 的 `id-token: write` 权限(已配)。
#      b) API token:GitHub Settings → Secrets → Actions →
#         PYPI_API_TOKEN(PyPI account-scoped token)。配了 token 会优先用它。
#   2. tag 形如 `v0.1.0`;uv build 产物由 tag refname 取版本。
#   3. 本地 `uv lock` 已与 `pyproject.toml` 对齐,`uv build` 可干净构建。
on:
  push:
    tags:
      - "v*"

# `id-token: write` 让 PyPI trusted publishing (OIDC) 工作;`contents: read`
# 是 checkout 最低权限。若用 API token (secret) 发布则 id-token 非必需,
# 但保留 id-token 让两种方式都能用。
permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    name: Build sdist + wheel and publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Build sdist + wheel
        # `uv build` 在仓库根目录生成 `dist/` 下的 sdist(.tar.gz)与 wheel(.whl)。
        # 等价于 `python -m build`,但直接复用 uv 缓存,无需额外装 build 包。
        run: uv build

      - name: Verify sdist long-description
        # PyPI 项目页展示的 README 取自 sdist 的 PKG-INFO 长描述。若发布期
        # README 仍写 "not yet published / source install" 之类的过时指引
        # (历史上 v0.1.0 因 tag 在 README 修复之前而发出错误描述),会误导
        # 新用户。发布前校验长描述含 PyPI 安装指引、不含发布前措辞。
        run: |
          python - <<'PY'
          import glob, tarfile
          (sd,) = glob.glob("dist/*.tar.gz")
          with tarfile.open(sd) as t:
              name = next(n for n in t.getnames() if n.endswith("/PKG-INFO"))
              info = t.extractfile(name).read().decode("utf-8", "replace")
          # Body after the headers (first blank line).
          body = info.split("\n\n", 1)[-1]
          assert "pip install mm-asset-rag" in body, "sdist README 缺 PyPI 安装指引"
          assert "not yet published" not in body, "sdist README 仍含发布前措辞"
          print("sdist long-description OK")
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # 发布鉴权:配了 PYPI_API_TOKEN secret 就用它;否则走 PyPI trusted
        # publishing (OIDC,需 PyPI 项目设置 Trusted Publisher)。
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
